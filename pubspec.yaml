name: cyber_incident_log
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  uuid: ^4.5.1
  supabase_flutter: ^2.9.1
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: image/app_icon_shield.png
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
    image_path: image/app_icon_shield.png
    icon_size: 256
  macos:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - .env
